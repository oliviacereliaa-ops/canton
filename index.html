<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Canton Products">
<meta name="theme-color" content="#0ea5e9">
<title>Canton Fair · Products</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  :root{
    --bg:#f0f9ff;--card:#fff;--ink:#0f2438;--muted:#5d7286;
    --line:#d9e6f0;--accent:#0ea5e9;--accent2:#38bdf8;--accent-d:#0369a1;
    --warn:#c2410c;--ok:#0d9488;--chip:#e0f2fe;
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  body{padding-bottom:env(safe-area-inset-bottom);min-height:100vh}
  header{position:sticky;top:0;z-index:10;
    background:linear-gradient(135deg,#38bdf8 0%,#60a5fa 100%);
    color:#fff;padding:env(safe-area-inset-top) 14px 0;
    box-shadow:0 1px 3px rgba(2,132,199,.12)}
  .brand{display:flex;align-items:center;justify-content:space-between;height:50px}
  .brand h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px}
  .brand h1 small{font-weight:400;opacity:.85;font-size:13px;margin-left:6px}
  .brand .menu{background:transparent;border:0;color:#fff;font-size:22px;padding:6px 10px;cursor:pointer}

  main{padding:14px 12px 100px;max-width:780px;margin:0 auto}
  .toolbar{display:flex;gap:8px;align-items:center;margin:0 0 12px}
  .toolbar input[type=search]{flex:1;padding:10px 14px;border:1px solid var(--line);
    border-radius:12px;background:#fff;font-size:14px;outline:none}
  .toolbar input[type=search]:focus{border-color:var(--accent)}

  .list{display:flex;flex-direction:column;gap:10px}
  .item{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;
    transition:transform .08s, border-color .15s}
  .item:active{transform:scale(.99);border-color:var(--accent2)}
  .item .thumb{width:62px;height:62px;border-radius:12px;background:#eaf3fa;overflow:hidden;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#9ab3c4;font-size:11px}
  .item .thumb img{width:100%;height:100%;object-fit:cover}
  .item .meta{flex:1;min-width:0}
  .item .meta .t{font-weight:600;font-size:15.5px;margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .meta .s{color:var(--muted);font-size:12.5px;line-height:1.4}
  .item .meta .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .chip{display:inline-block;background:var(--chip);color:var(--accent-d);font-size:11px;
    padding:2px 9px;border-radius:99px;font-weight:500}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  .empty b{display:block;color:var(--ink);font-size:16px;margin-bottom:6px}
  .empty .hint{margin-top:14px;font-size:13px}

  .fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));
    width:60px;height:60px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent2) 0%,var(--accent) 100%);color:#fff;
    border:0;font-size:30px;line-height:1;
    box-shadow:0 6px 18px rgba(2,132,199,.3);z-index:8;cursor:pointer}

  .sheet-bg{position:fixed;inset:0;background:rgba(15,36,56,.45);z-index:20;
    display:none;align-items:flex-end;justify-content:center}
  .sheet-bg.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:780px;max-height:94vh;border-radius:18px 18px 0 0;
    overflow:hidden;display:flex;flex-direction:column}
  .sheet-h{display:flex;align-items:center;justify-content:center;
    padding:14px 14px;border-bottom:1px solid var(--line);position:relative;background:#fff;z-index:2}
  .sheet-h h2{margin:0;font-size:16px;font-weight:600}
  .sheet-h .x{position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:transparent;border:0;font-size:22px;padding:8px 12px;color:var(--muted);cursor:pointer;line-height:1}
  .sheet-body{overflow:auto;padding:14px;flex:1;-webkit-overflow-scrolling:touch}
  .sheet-f{display:flex;gap:10px;padding:12px 14px;
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);background:#fff;z-index:3}
  .sheet-f .btn{flex:1;padding:14px 18px;font-size:15.5px;font-weight:600;border-radius:12px}

  label.f{display:block;margin:0 0 12px}
  label.f>span{display:block;font-size:11.5px;font-weight:600;color:var(--accent-d);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  label.f input,label.f select,label.f textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;background:#fff;font-family:inherit;outline:none}
  label.f textarea{min-height:74px;resize:vertical}
  label.f input:focus,label.f select:focus,label.f textarea:focus{border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media(max-width:480px){.row3{grid-template-columns:1fr 1fr}}

  .group{background:#f7fbfd;border:1px solid var(--line);border-radius:12px;padding:12px;margin:0 0 12px}
  .group>h3{margin:0 0 10px;font-size:13px;color:var(--accent-d);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .group>h3 small{font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;margin-left:6px}

  .price-conv{font-size:12.5px;color:var(--accent-d);margin-top:5px;font-weight:500}
  .price-conv.empty{color:var(--muted);font-weight:400}

  .photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px}
  .photo{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#eaf3fa}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo button{position:absolute;top:4px;right:4px;background:rgba(15,36,56,.6);color:#fff;
    border:0;width:22px;height:22px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer}
  .photo .badge{position:absolute;bottom:3px;left:3px;background:rgba(2,132,199,.9);color:#fff;
    font-size:9.5px;padding:1px 6px;border-radius:99px;letter-spacing:.4px;display:flex;align-items:center;gap:3px}
  .photo .badge.warn{background:rgba(194,65,12,.9)}
  .add-photo{aspect-ratio:1;border:2px dashed #b9d2e4;border-radius:10px;background:#fff;
    display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--muted);
    font-size:11px;cursor:pointer}
  .add-photo span{font-size:26px;color:var(--accent);font-weight:300;line-height:1}
  .add-photo input{display:none}

  .multi-row{display:flex;flex-direction:column;gap:6px}
  .v-row{display:grid;grid-template-columns:1.2fr 1fr 1fr 28px;gap:6px;align-items:center}
  .v-row input{padding:8px 10px;font-size:14px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .v-row button{background:transparent;border:0;color:var(--warn);font-size:18px;cursor:pointer;padding:0}
  .add-row{background:var(--chip);border:0;color:var(--accent-d);padding:8px 12px;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;align-self:flex-start}

  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .btn{padding:11px 18px;border-radius:10px;border:1px solid var(--line);background:#fff;
    font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:active{background:var(--accent-d)}
  .btn.danger{color:var(--warn);border-color:#f1d4c2}
  .btn.ghost{background:#f0f9ff;color:var(--accent-d);border-color:var(--line)}

  .menu-list{position:fixed;top:56px;right:8px;background:#fff;border:1px solid var(--line);
    border-radius:12px;box-shadow:0 8px 24px rgba(2,132,199,.15);z-index:30;min-width:240px;display:none;overflow:hidden}
  .menu-list.show{display:block}
  .menu-list button{display:block;width:100%;text-align:left;padding:12px 16px;background:transparent;
    border:0;font-size:14.5px;cursor:pointer;border-bottom:1px solid var(--line);font-family:inherit}
  .menu-list button:last-child{border-bottom:0}
  .menu-list button.danger{color:var(--warn)}
  .menu-list button:hover{background:#f0f9ff}
  .menu-list .status{padding:9px 16px;background:#f7fbfd;font-size:11.5px;color:var(--muted);border-bottom:1px solid var(--line)}
  .menu-list .status b{color:var(--accent-d)}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0f2438;
    color:#fff;padding:11px 18px;border-radius:99px;font-size:13.5px;z-index:50;opacity:0;
    transition:opacity .2s;max-width:80%;text-align:center;pointer-events:none}
  .toast.show{opacity:1}
  .toast.err{background:var(--warn)}

  .uploading{display:inline-block;width:9px;height:9px;border-radius:50%;
    border:1.5px solid #fff;border-top-color:transparent;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .pdf-render{display:none;background:#fff;color:#0f2438;
    font:13px/1.5 -apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;padding:30px}
  body.printing > *:not(.pdf-render){display:none !important}
  body.printing .pdf-render{display:block !important}
  @media print{
    @page{size:A4;margin:14mm}
    body{background:#fff !important}
    body > *:not(.pdf-render){display:none !important}
    .pdf-render{display:block !important;padding:0 !important}
  }
  .pdf-render h1{font-size:24px;margin:0 0 6px;color:var(--accent-d)}
  .pdf-render .sub{color:var(--muted);font-size:13px;margin-bottom:18px;border-bottom:2px solid var(--accent2);padding-bottom:10px}
  .pdf-render h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-d);
    margin:18px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--line)}
  .pdf-render table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
  .pdf-render table td{padding:6px 8px;vertical-align:top;border-bottom:1px solid var(--line)}
  .pdf-render table td:first-child{width:32%;color:var(--muted);font-weight:500}
  .pdf-render .ph-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  .pdf-render .ph-grid img{width:100%;border-radius:6px;border:1px solid var(--line)}
  .pdf-render .notes-box{background:#f7fbfd;border:1px solid var(--line);border-radius:6px;
    padding:10px 12px;font-size:13px;white-space:pre-wrap}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Canton Fair <small>Products</small></h1>
    <button class="menu" id="menuBtn" aria-label="Menu">⋯</button>
  </div>
</header>

<div class="menu-list" id="menuList">
  <div class="status" id="driveStatus">Drive: <b>not connected</b></div>
  <button id="setupDrive">Connect Google Drive</button>
  <button id="rates">Exchange rates</button>
  <button id="openDrive">Open Drive folder</button>
  <button id="exportJson">Backup data (JSON)</button>
  <button id="importJson">Restore from backup</button>
  <button id="howto">How to use / Drive setup</button>
  <button id="wipe" class="danger">Erase all data</button>
</div>

<main>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search products…">
  </div>
  <div id="list" class="list"></div>
</main>

<button class="fab" id="addBtn" aria-label="Add">+</button>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <div class="sheet-h">
      <h2 id="sheetTitle">New product</h2>
      <button class="x" id="closeX" aria-label="Close">×</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
    <div class="sheet-f">
      <button class="btn ghost" id="backBtn">← Back</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<input type="file" id="restoreFile" accept="application/json" style="display:none">
<div class="pdf-render" id="pdfRender"></div>
<div class="toast" id="toast"></div>

<script>
/* =================== STORAGE =================== */
const DB = (() => {
  let dbp;
  function open(){
    if(dbp) return dbp;
    dbp = new Promise((res,rej)=>{
      const req = indexedDB.open('cantonprod',1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if(!db.objectStoreNames.contains('products')) db.createObjectStore('products',{keyPath:'id'});
      };
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e.target.error);
    });
    return dbp;
  }
  return {
    async all(){
      const db = await open();
      return new Promise(res=>{
        const out=[];
        db.transaction('products').objectStore('products').openCursor().onsuccess = e=>{
          const c=e.target.result; if(c){out.push(c.value); c.continue();} else res(out);
        };
      });
    },
    async put(val){
      const db = await open();
      return new Promise((res,rej)=>{
        const r = db.transaction('products','readwrite').objectStore('products').put(val);
        r.onsuccess=()=>res(val); r.onerror=()=>rej(r.error);
      });
    },
    async del(id){
      const db = await open();
      return new Promise((res,rej)=>{
        const r = db.transaction('products','readwrite').objectStore('products').delete(id);
        r.onsuccess=()=>res(); r.onerror=()=>rej(r.error);
      });
    },
    async clear(){
      const db = await open();
      return new Promise(r=>{
        db.transaction('products','readwrite').objectStore('products').clear().onsuccess=()=>r();
      });
    }
  };
})();

const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const escapeHtml = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
function toast(msg, err){ const t=$('#toast'); t.textContent=msg; t.classList.toggle('err', !!err); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

/* =================== RATES =================== */
const DEFAULT_RATES = { USD_IDR:16000, CNY_IDR:2500, EUR_IDR:17500 };
function getRates(){
  try{
    const r = JSON.parse(localStorage.getItem('rates')||'{}');
    return { ...DEFAULT_RATES, ...r };
  }catch{ return {...DEFAULT_RATES}; }
}
function setRates(r){ localStorage.setItem('rates', JSON.stringify(r)); }
function calcIDR(price, currency){
  const p = parseFloat(price);
  if(!p || !currency || currency==='IDR') return null;
  const r = getRates();
  const rate = r[currency+'_IDR'];
  if(!rate) return null;
  return Math.round(p * rate);
}
function fmtIDR(n){ return n.toLocaleString('id-ID'); }

/* =================== STATE =================== */
const state = { products:[], editing:null, search:'' };

async function reload(){
  state.products = await DB.all();
  render();
}

/* =================== DRIVE / SHEET (Apps Script) =================== */
const Drive = {
  get url(){ return localStorage.getItem('drive_url') || ''; },
  set url(v){ localStorage.setItem('drive_url', v); updateDriveStatus(); },
  get connected(){ return !!this.url; },

  async uploadPhoto(base64, filename){
    if(!this.url) return null;
    const data = base64.replace(/^data:image\/\w+;base64,/,'');
    const mime = (base64.match(/^data:(image\/\w+);base64,/)||[])[1] || 'image/jpeg';
    const body = JSON.stringify({ action:'photo', filename, mimeType:mime, image:data, folder:'Canton Fair Photos' });
    try{
      const res = await fetch(this.url, { method:'POST', body });
      try{
        const j = await res.json();
        if(j && j.ok) return j;
      }catch{}
      return { ok:true, optimistic:true };
    }catch(err){
      console.warn('upload error', err);
      return { ok:true, optimistic:true };
    }
  },

  syncProduct(product){
    if(!this.url) return;
    const slim = stripPhotos(product);
    fetch(this.url, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({ action:'syncProduct', product: slim })
    }).catch(err=>console.warn('sync error', err));
  },

  deleteProduct(id){
    if(!this.url) return;
    fetch(this.url, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({ action:'deleteProduct', id })
    }).catch(()=>{});
  }
};
function stripPhotos(p){
  return {
    id: p.id, updatedAt: p.updatedAt,
    name: p.name, supplierName: p.supplierName, supplierBooth: p.supplierBooth, supplierContact: p.supplierContact,
    factoryLoc: p.factoryLoc, nearestPort: p.nearestPort,
    category: p.category, description: p.description,
    price: p.price, currency: p.currency, priceIDR: calcIDR(p.price, p.currency),
    moq: p.moq, leadTime: p.leadTime,
    itemW: p.itemW, itemL: p.itemL, itemH: p.itemH,
    weightG: p.weightG, gsm: p.gsm, material: p.material,
    pkgW: p.pkgW, pkgL: p.pkgL, pkgH: p.pkgH,
    pkgMaterial: p.pkgMaterial, pkgNotes: p.pkgNotes,
    sampleStatus: p.sampleStatus, sampleCost: p.sampleCost,
    variants: p.variants||[],
    notes: p.notes,
    photoUrls: (p.photos||[]).map(ph=>ph.driveUrl||'').filter(Boolean)
  };
}
function updateDriveStatus(){
  const el = $('#driveStatus');
  if(!el) return;
  el.innerHTML = 'Drive: ' + (Drive.connected ? '<b style="color:var(--ok)">connected</b>' : '<b>not connected</b>');
}

/* =================== HELPERS =================== */
async function fileToCompressed(file, maxDim=1280, quality=.72){
  const img = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=e.target.result; };
    r.onerror=rej; r.readAsDataURL(file);
  });
  let {width:w,height:h}=img;
  if(w>maxDim||h>maxDim){ const r=Math.min(maxDim/w,maxDim/h); w=Math.round(w*r); h=Math.round(h*r); }
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  return c.toDataURL('image/jpeg', quality);
}

/* =================== RENDER LIST =================== */
function render(){
  let items = state.products.slice();
  if(state.search){
    const q = state.search.toLowerCase();
    items = items.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
  }
  items.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const list = $('#list');
  if(!items.length){
    list.innerHTML = `<div class="empty">
      <b>No products yet</b>
      Tap <span style="background:var(--accent);color:#fff;padding:2px 9px;border-radius:99px">+</span> to add your first product.
      <div class="hint">Each entry holds photos, supplier info, prices, variants, and notes — and exports as a PDF.</div>
    </div>`;
    return;
  }
  list.innerHTML = items.map(it=>renderCard(it)).join('');
  $$('#list .item').forEach(el=>{
    el.addEventListener('click',()=>edit(el.dataset.id));
  });
}
function renderCard(it){
  const ph = (it.photos&&it.photos[0]);
  const thumb = ph ? `<img src="${ph.data || ph.driveThumbnail || ''}">` : 'no photo';
  const sub = [it.supplierName, it.category].filter(Boolean).join(' · ') || 'Tap to fill in';
  const chips = [];
  if(it.price){
    const idr = calcIDR(it.price, it.currency);
    chips.push(`${it.currency||'USD'} ${it.price}${idr?` ≈ IDR ${fmtIDR(idr)}`:''}`);
  }
  if(it.moq) chips.push(`MOQ ${escapeHtml(it.moq)}`);
  if(it.leadTime) chips.push(`LT ${escapeHtml(it.leadTime)}`);
  if(it.variants && it.variants.length) chips.push(`${it.variants.length} variants`);
  return `<div class="item" data-id="${it.id}">
    <div class="thumb">${thumb}</div>
    <div class="meta">
      <p class="t">${escapeHtml(it.name||'(unnamed)')}</p>
      <div class="s">${escapeHtml(sub)}</div>
      <div class="chips">${chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
    </div>
  </div>`;
}

/* =================== EDIT FORM =================== */
function blank(){
  return {
    id:uid(), createdAt:Date.now(), updatedAt:Date.now(),
    name:'', supplierName:'', supplierBooth:'', supplierContact:'',
    factoryLoc:'', nearestPort:'',
    category:'', description:'',
    price:'', currency:'USD', moq:'', leadTime:'',
    itemW:'', itemL:'', itemH:'', weightG:'', gsm:'', material:'',
    pkgW:'', pkgL:'', pkgH:'', pkgMaterial:'', pkgNotes:'',
    sampleStatus:'', sampleCost:'',
    variants:[], notes:'', photos:[]
  };
}
function edit(id){
  const item = id ? state.products.find(x=>x.id===id) : blank();
  state.editing = JSON.parse(JSON.stringify(item));
  $('#sheetTitle').textContent = id ? 'Edit product' : 'New product';
  $('#sheetBody').innerHTML = formHtml(state.editing);
  bindFormEvents();
  updatePriceConv();
  $('#sheetBg').classList.add('show');
}
function close(){ $('#sheetBg').classList.remove('show'); state.editing=null; }

function formHtml(it){
  const isExisting = state.products.find(p=>p.id===it.id);
  return `
    <div class="group"><h3>Photos</h3>
      <div class="photos" id="photos">
        ${renderPhotos(it.photos||[])}
        <label class="add-photo"><span>+</span>add photo
          <input type="file" accept="image/*" capture="environment" multiple id="photoInput">
        </label>

        </label>

          <select data-k="currency" id="currencyIn">${['USD','CNY','EUR','IDR'].map(c=>`<option ${it.currency===c?'selected':''}>${c}</option>`).join('')}</select>

      <div class="price-conv empty" id="priceConv"></div>
      <label class="f" style="margin-top:8px"><span>Lead time</span><input data-k="leadTime" value="${escapeHtml(it.leadTime)}" placeholder="e.g. 35 days"></label>
    </div>

    <div class="group"><h3>Item Specs</h3>
      <label class="f"><span>Dimensions (cm) — W × L × H</span>
        <div class="row3">
          <input data-k="itemW" type="number" inputmode="decimal" placeholder="Width" value="${escapeHtml(it.itemW)}">
          <input data-k="itemL" type="number" inputmode="decimal" placeholder="Length" value="${escapeHtml(it.itemL)}">

function renderPhotos(photos){
  return photos.map((p,i)=>{
    const src = p.data || p.driveThumbnail || '';
    let badge = '';
    if(p.driveId || p.driveUploaded) badge = '<span class="badge">Drive ✓</span>';
    else if(p.uploading) badge = '<span class="badge"><span class="uploading"></span>sync</span>';
    else if(p.uploadFailed) badge = '<span class="badge warn">no sync</span>';
    return `<div class="photo">
      <img src="${src}">
      ${badge}
      <button data-photo="${i}">×</button>
    </div>`;
  }).join('');
}

function variantRow(v={},i){
  return `<div class="v-row" data-vi="${i}">
    <input data-vk="name" value="${escapeHtml(v.name||'')}" placeholder="color/size">
    <input data-vk="sku" value="${escapeHtml(v.sku||'')}" placeholder="SKU">
    <input data-vk="price" value="${escapeHtml(v.price||'')}" placeholder="±price">
    <button data-vremove="${i}">×</button>
  </div>`;
}

function updatePriceConv(){
  const it = state.editing; if(!it) return;
  const conv = $('#priceConv'); if(!conv) return;
  const idr = calcIDR(it.price, it.currency);
  if(idr){
    conv.classList.remove('empty');
    conv.textContent = `≈ IDR ${fmtIDR(idr)}  ·  rate ${getRates()[it.currency+'_IDR']}/${it.currency}`;
  } else {
    conv.classList.add('empty');
    conv.textContent = (it.currency==='IDR') ? '' : 'Enter price to see IDR equivalent';
  }
}

function bindFormEvents(){
  $$('#sheetBody [data-k]').forEach(el=>{
    el.addEventListener('input',()=>{
      state.editing[el.dataset.k]=el.value;
      if(el.dataset.k==='price' || el.dataset.k==='currency') updatePriceConv();
    });
    el.addEventListener('change',()=>{
      if(el.dataset.k==='currency') updatePriceConv();
    });
  });
  const pin = $('#photoInput');
  if(pin){
    pin.addEventListener('change', async e=>{
      for(const f of e.target.files){
        try{
          const data = await fileToCompressed(f);
          state.editing.photos = state.editing.photos || [];
          const photo = { data, addedAt:Date.now(), uploading: Drive.connected, uploadFailed:false };
          state.editing.photos.push(photo);
          refreshPhotos();
          if(Drive.connected){
            const fn = `cf_${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
            const r = await Drive.uploadPhoto(data, fn);
            if(r && r.id){
              photo.driveId = r.id; photo.driveUrl = r.url; photo.driveThumbnail = r.thumbnail;
            } else if(r && r.optimistic){
              photo.driveUploaded = true;
            }
            photo.uploading = false;
            refreshPhotos();
          }
        }catch(err){console.error(err); toast('Could not add photo', true);}
      }
      e.target.value='';
    });
  }
  $$('#sheetBody .photo button[data-photo]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const i=+b.dataset.photo;
      state.editing.photos.splice(i,1);
      refreshPhotos();
    });
  });
  const addV = $('#addVariant');
  if(addV) addV.addEventListener('click',()=>{
    state.editing.variants = state.editing.variants || [];
    state.editing.variants.push({name:'',sku:'',price:''});
    refreshVariants();
  });
  $$('#variants .v-row').forEach(row=>{
    const i = +row.dataset.vi;
    row.querySelectorAll('input[data-vk]').forEach(inp=>{
      inp.addEventListener('input',()=>{ state.editing.variants[i][inp.dataset.vk]=inp.value; });
    });
    const rm = row.querySelector('[data-vremove]');
    if(rm) rm.addEventListener('click',()=>{ state.editing.variants.splice(i,1); refreshVariants(); });
  });
  $$('#sheetBody .actions button').forEach(b=>{
    b.addEventListener('click', e=>{
      e.preventDefault();
      const act = b.dataset.act;
      if(act==='del'){
        if(!confirm('Delete this product?')) return;
        const idToDel = state.editing.id;
        DB.del(idToDel).then(()=>{ Drive.deleteProduct(idToDel); reload().then(()=>{ close(); toast('Deleted'); }); });
      } else if(act==='pdf'){
        // SYNC path — iOS Safari blocks window.print() outside user gesture, so no await
        const it = state.editing;
        if(!it.name || !it.name.trim()){ toast('Product name is required', true); return; }
        it.updatedAt = Date.now();
        const idx = state.products.findIndex(p=>p.id===it.id);
        const snap = JSON.parse(JSON.stringify(it));
        if(idx >= 0) state.products[idx] = snap; else state.products.push(snap);
        DB.put(it);
        Drive.syncProduct(it);
        generatePDF(it.id);
      }
    });
  });
}
function refreshPhotos(){
  const wrap = $('#photos');
  if(!wrap) return;
  wrap.innerHTML = renderPhotos(state.editing.photos||[]) +
    `<label class="add-photo"><span>+</span>add photo
      <input type="file" accept="image/*" capture="environment" multiple id="photoInput"></label>`;
  bindFormEvents();
}
function refreshVariants(){
  $('#variants').innerHTML = (state.editing.variants||[]).map((v,i)=>variantRow(v,i)).join('');
  bindFormEvents();
}

async function save(opts={}){
  const it = state.editing;
  if(!it){ if(!opts.silent) close(); return false; }
  if(!it.name || !it.name.trim()){ toast('Product name is required', true); return false; }
  it.updatedAt = Date.now();
  await DB.put(it);
  Drive.syncProduct(it);
  await reload();
  if(!opts.silent){ close(); toast(Drive.connected ? 'Saved & synced to Sheet' : 'Saved'); }
  return true;
}

/* =================== PDF (iframe-isolated) =================== */
function generatePDF(id){
  const p = state.products.find(x=>x.id===id);
  if(!p){ toast('Save first', true); return; }
  const date = new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'});
  const row = (k,v) => v ? `<tr><td>${k}</td><td>${escapeHtml(v)}</td></tr>` : '';
  const idr = calcIDR(p.price, p.currency);
  const priceLine = p.price ? `${p.currency||'USD'} ${p.price}${idr?`  (≈ IDR ${fmtIDR(idr)})`:''}` : '';
  const dims = [p.itemW,p.itemL,p.itemH].filter(x=>x!==''&&x!=null).join(' × ');
  const pkgDims = [p.pkgW,p.pkgL,p.pkgH].filter(x=>x!==''&&x!=null).join(' × ');
  const safeName = (p.name||'product').replace(/[^a-z0-9\-_ ]/gi,'').trim().replace(/\s+/g,'_').slice(0,60) || 'product';

  const inner = `
    <h1>${escapeHtml(p.name||'(unnamed)')}</h1>
    <div class="sub">Canton Fair &middot; ${date}${p.supplierName?` &middot; ${escapeHtml(p.supplierName)}`:''}</div>

    ${(p.photos&&p.photos.length)?`
      <h2>Photos</h2>
      <div class="ph-grid">${p.photos.map(ph=>`<img src="${ph.data||ph.driveThumbnail||''}" crossorigin="anonymous">`).join('')}</div>
    `:''}

    <div class="cols">
      <div>
        <h2>Product</h2>
        <table>
          ${row('Category', p.category)}
          ${row('Description', p.description)}
          ${row('Price', priceLine)}
          ${row('MOQ', p.moq)}
          ${row('Lead time', p.leadTime)}
          ${row('Sample', [p.sampleStatus, p.sampleCost].filter(Boolean).join(' · '))}
        </table>
      </div>
      <div>
        <h2>Supplier</h2>
        <table>
          ${row('Company', p.supplierName)}
          ${row('Booth', p.supplierBooth)}
          ${row('Contact', p.supplierContact)}
          ${row('Factory loc.', p.factoryLoc)}
          ${row('Nearest port', p.nearestPort)}
        </table>
      </div>
    </div>

    <div class="cols">
      <div>
        <h2>Item Specs</h2>
        <table>
          ${row('Dim (cm) W×L×H', dims)}
          ${row('Weight (g)', p.weightG)}
          ${row('GSM', p.gsm)}
          ${row('Material', p.material)}
        </table>
      </div>
      <div>
        <h2>Packaging</h2>
        <table>
          ${row('Pkg dim (cm) W×L×H', pkgDims)}
          ${row('Pkg material', p.pkgMaterial)}
          ${row('Pkg notes', p.pkgNotes)}
        </table>
      </div>
    </div>

    ${(p.variants&&p.variants.length)?`
      <h2>Variants</h2>
      <table>
        <tr style="background:#f0f9ff"><td><b>Name</b></td><td><b>SKU</b></td><td><b>Price &plusmn;</b></td></tr>
        ${p.variants.map(v=>`<tr><td>${escapeHtml(v.name)}</td><td>${escapeHtml(v.sku)}</td><td>${escapeHtml(v.price)}</td></tr>`).join('')}
      </table>`:''}

    ${p.notes?`<h2>Notes</h2><div class="notes-box">${escapeHtml(p.notes)}</div>`:''}
  `;

  const docHtml = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>canton_${safeName}</title>
<style>
  @page{size:A4;margin:10mm}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#fff;color:#0f2438;
    font:10.5px/1.35 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif}
  h1{font-size:17px;margin:0 0 1px;color:#0369a1;font-weight:700;letter-spacing:.1px}
  .sub{color:#5d7286;font-size:10px;margin-bottom:7px;border-bottom:1.5px solid #38bdf8;padding-bottom:4px}
  h2{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#0369a1;
    margin:7px 0 2px;padding:0 0 1px;border-bottom:1px solid #d9e6f0;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:10px;margin:1px 0 0}
  table td{padding:2px 5px;vertical-align:top;border-bottom:1px solid #eaf3fa;line-height:1.3}
  table td:first-child{width:32%;color:#5d7286;font-weight:500}
  .ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin:3px 0 0;page-break-inside:avoid}
  .ph-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:3px;border:1px solid #d9e6f0;display:block}
  .notes-box{background:#f7fbfd;border:1px solid #d9e6f0;border-radius:4px;
    padding:5px 8px;font-size:10px;white-space:pre-wrap;line-height:1.4}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  .cols > div{min-width:0}
  .cols h2{margin-top:4px}
</style>
</head><body>${inner}</body></html>`;

  // remove any existing print iframe
  const old = document.getElementById('printIframe');
  if(old) old.remove();

  // create on-screen iframe (visible but covered by overlay), iOS needs it in viewport
  const iframe = document.createElement('iframe');
  iframe.id = 'printIframe';
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:0;background:#fff;z-index:99999;';
  document.body.appendChild(iframe);

  const idoc = iframe.contentDocument || iframe.contentWindow.document;
  idoc.open();
  idoc.write(docHtml);
  idoc.close();

  // Force layout in iframe, then print synchronously (iOS user-gesture friendly)
  void iframe.contentDocument.body.offsetHeight;
  document.title = `canton_${safeName}`;
  try{
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
  }catch(e){
    console.error(e);
    toast('Print failed: '+(e.message||'unknown'), true);
  }
  // cleanup after dialog has had time to capture
  setTimeout(()=>{ if(iframe.parentNode) iframe.remove(); }, 2500);
}

/* =================== BACKUP =================== */
async function exportJson(){
  const data = { version:3, exportedAt:new Date().toISOString(), products:state.products, rates:getRates() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `canton-products-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast('Backup downloaded');
}
async function importJson(file){
  try{
    const txt = await file.text();
    const data = JSON.parse(txt);
    if(!data.products) throw new Error('Bad file');
    if(!confirm('REPLACE all current products with this backup?')) return;
    await DB.clear();
    for(const p of data.products) await DB.put(p);
    if(data.rates) setRates(data.rates);
    await reload();
    toast('Restored');
  }catch(e){ alert('Could not read file: '+e.message); }
}

/* =================== DRIVE SETUP =================== */
function setupDriveDialog(){
  const current = Drive.url;
  const v = prompt(
    'Paste your Google Apps Script Web App URL (see ⋯ → How to use for setup steps).\n\nLeave empty to disconnect.',
    current
  );
  if(v===null) return;
  if(!v.trim()){ Drive.url=''; toast('Drive disconnected'); return; }
  Drive.url = v.trim();
  toast('URL saved — try adding a photo to test');
}

function setupRatesDialog(){
  const r = getRates();
  const usd = prompt(`USD → IDR rate\n(current: ${r.USD_IDR})`, r.USD_IDR);
  if(usd===null) return;
  const cny = prompt(`CNY → IDR rate\n(current: ${r.CNY_IDR})`, r.CNY_IDR);
  if(cny===null) return;
  const eur = prompt(`EUR → IDR rate\n(current: ${r.EUR_IDR})`, r.EUR_IDR);
  if(eur===null) return;
  setRates({
    USD_IDR: parseFloat(usd) || r.USD_IDR,
    CNY_IDR: parseFloat(cny) || r.CNY_IDR,
    EUR_IDR: parseFloat(eur) || r.EUR_IDR,
  });
  toast('Rates updated');
  updatePriceConv();
  render();
}
